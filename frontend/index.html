<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumGuard | Post-Quantum Cybersecurity</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .landing-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 2rem;
            background: radial-gradient(circle at center, rgba(20,25,40,1) 0%, var(--bg-dark) 100%);
            overflow: hidden;
            z-index: 1;
        }
        
        /* Grid Background Effect */
        .landing-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            pointer-events: none;
            opacity: 0.5;
        }

        .hero-logo {
            width: 140px;
            height: 140px;
            border-radius: 28px;
            object-fit: cover;
            box-shadow: 0 0 60px var(--primary-glow);
            margin-bottom: 2.5rem;
            animation: float 6s ease-in-out infinite;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .landing-container h1 {
            font-size: 4.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #ffffff, #60a5fa);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }
        .landing-container p {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 650px;
            margin-bottom: 3.5rem;
            line-height: 1.7;
        }
        .auth-buttons {
            display: flex;
            gap: 1.5rem;
            z-index: 10;
        }
        .auth-btn {
            padding: 1.2rem 3rem;
            font-size: 1.15rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
        }
        .btn-admin {
            background: linear-gradient(135deg, var(--primary), #2563eb);
            color: white;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-admin:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.6);
        }
        .btn-user {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-user:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-4px) scale(1.02);
        }
        @keyframes float {
            0% { transform: translateY(0px); box-shadow: 0 0 50px var(--primary-glow); }
            50% { transform: translateY(-20px); box-shadow: 0 20px 70px var(--primary-glow); }
            100% { transform: translateY(0px); box-shadow: 0 0 50px var(--primary-glow); }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <img src="/static/logo.png" alt="QuantumGuard" class="hero-logo">
        <h1>QuantumGuard</h1>
        <p>The enterprise-grade Post-Quantum Cryptography (PQC) readiness scanner. Instantly detect vulnerabilities, analyze legacy cipher suites, and prepare your public-facing infrastructure for the quantum era.</p>
        
        <div class="auth-buttons">
            <button class="auth-btn btn-admin" onclick="login('Admin')">Admin Login</button>
            <button class="auth-btn btn-user" onclick="login('Security Analyst')">Analyst Login</button>
        </div>
    </div>

    <script>
        function login(role) {
            localStorage.setItem('qg_role', role);
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
